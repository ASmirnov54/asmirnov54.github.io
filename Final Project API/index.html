<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

    <title>Fortnite Shop</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1 class="SectionTitle text-center">Fortnite Item Shop</h1>
    <div class="row" style="margin: 1%;">
        <div class="col-md-4 order-md-2">
            <div class="sticky-top text-center">
                <p class="SectionTitle">Filter</p>
                <button class="closebutton" onclick="filterShop('none')">NONE</button>
                <button class="closebutton" onclick="filterShop('leaving')">LEAVING TONIGHT</button>
                <button class="closebutton" onclick="filterShop('new')">ADDED LAST RESET</button>
            </div>
        </div>
        <div id="shopcontainer" class="col-md-8 order-md-1">

        </div>
    </div>
</body>

<script>
    // these variables are used by the filter
    var shopEntries;
    var shopDate;

    // function to filter the item shop
    // for simplicity the items that are filtered out are just made mostly transparent, i didnt want to fight the
    // shop layout changing
    function filterShop(filterType) {
        var filtered;
        if (filterType == 'none') {
            filtered = shopEntries.filter(entry => {
                return true;
            });
        }
        else if (filterType == 'leaving') {
            filtered = shopEntries.filter(entry => {
                if (shopDate.split("T")[0] == entry.outDate.split("T")[0]) return true;
                return false;
            });
        }
        else if (filterType == 'new') {
            filtered = shopEntries.filter(entry => {
                if (shopDate.split("T")[0] == entry.inDate.split("T")[0]) return true;
                return false;
            });
        }
        else { return }

        console.log(filtered)

        shopEntries.forEach((entry, index) => {
            const entryShopTile = document.getElementById(entry.offerId)

            if (entryShopTile == null) return;

            entryShopTile.style.opacity = "10%";
        })
        filtered.forEach((entry, index) => {
            const entryShopTile = document.getElementById(entry.offerId)

            if (entryShopTile == null) return;

            entryShopTile.style.opacity = "100%";
        })

    }

    async function fetchShop() {
        // Jam Tracks use a special shop format, not sure if I have time to impliment it
        const showJamTracks = false;

        // make request
        const url = 'https://fortnite-api.com/v2/shop';
        const options = { method: 'GET' };
        const response = await fetch(url, options);
        const data = await response.json();
        const entries = data.data.entries;
        shopEntries = entries;
        shopDate = data.data.date;

        // .filter() to take out unsupported or hidden entries
        // syntax learned from google as an easier way to do this than a forEach and if
        const filtered = entries.filter(entry => {
            if (!showJamTracks && entry.layoutId.includes("JT")) return false;
            if (entry.layoutId == "alc.0") return false; // ALC is not intended to be seen
            return true;
        });

        // sort entries within their categories to get the same order used in the real Fortnite shop
        filtered.sort((a, b) => {
            const [aSection, aNum] = a.layoutId.split('.');
            const [bSection, bNum] = b.layoutId.split('.');
            if (aSection < bSection) return -1;
            if (aSection > bSection) return 1;

            const numDiff = parseInt(bNum) - parseInt(aNum);
            if (numDiff !== 0) return numDiff;

            return b.sortPriority - a.sortPriority;
        });

        const container = document.getElementById('shopcontainer');
        // variables used for tracking when to divide shop sections using only
        // major section changes and not minor ones
        var lastLayoutName = null;
        var lastLayoutId = null;
        var currentSection = null;

        for (const entry of filtered) {
            const layoutName = entry.layout?.name || entry.layoutId;
            const layoutId = entry.layoutId;

            // create a new title if the layout ID is different, this means we changed major sections
            // compared to changing minor sections and a new heading is worth making
            if (layoutId !== lastLayoutId) {
                if (layoutName !== lastLayoutName) {
                    const title = document.createElement('p');
                    title.className = 'SectionTitle';
                    title.textContent = layoutName;
                    container.appendChild(title);
                    lastLayoutName = layoutName;
                }

                // create the section that will hold the 1-4 shop tiles
                currentSection = document.createElement('div');
                currentSection.className = 'section';
                container.appendChild(currentSection);

                lastLayoutId = layoutId;
            }

            // get color data for the entry
            // the ors are used in case there isnt a color for some reason, usually there is though
            const colors = entry.colors || {};
            const color1 = '#' + (colors.color1 || '00000000');
            const color2 = '#' + (colors.color2 || '00000000');
            const color3 = '#' + (colors.color3 || '00000000');
            const textBg = '#' + (colors.textBackgroundColor || '00000000');

            // determine factors about the entry for its tile
            // some of these determine to remove an element later or determine the dize of a tile
            const isCar = entry.cars?.length > 0;
            const isBundle = !!entry.bundle; //&& entry.regularPrice !== entry.finalPrice;
            const isJamTrack = entry.tracks?.length > 0;
            const hasBanner = !!entry.banner;
            const hasDiscount = entry.regularPrice !== entry.finalPrice;
            const isWide = entry.tileSize == 'Size_2_x_1';
            const isVeryWide = entry.tileSize == 'Size_3_x_1' || isCar;
            const isSuperWide = (!!(entry.layout?.useWidePreview) || entry.tileSize == 'Size_4_x_1') && !isCar;

            // set item name and type depending on certain conditions
            var itemName, itemType;
            if (isBundle) {
                itemName = entry.bundle.name;
                itemType = 'Bundle';
            } else if (entry.brItems?.length) {
                itemName = entry.brItems[0].name;
                itemType = entry.brItems[0].type?.displayValue || 'Item';
            } else if (entry.tracks?.length) {
                itemName = entry.tracks[0].title;
                itemType = 'Jam Track';
            } else if (entry.cars?.length) {
                itemName = entry.cars[0].name;
                itemType = entry.cars[0].type?.displayValue || 'Vehicle';
            } else if (entry.instruments?.length) {
                itemName = entry.instruments[0].name;
                itemType = entry.instruments[0].type?.displayValue || 'Instrument';
            } else {
                // i dont think this condition would ever be picked but its here just in case
                itemName = entry.devName;
                itemType = 'Item';
            }

            const renderImages = entry.newDisplayAsset?.renderImages;
            const featuredSrc = renderImages?.[0]?.image || entry.bundle?.image || entry.tracks?.[0]?.albumArt || '';

            // create the actual button element, this is the shop tile
            const btn = document.createElement('button');

            // assign classes to the button element used for css styles
            const classes = ['shoptile'];
            if (isWide) classes.push('largetile');
            if (isVeryWide) classes.push('wideishtile');
            if (isSuperWide) classes.push('widetile');
            if (isCar) classes.push('cartile');
            if (isJamTrack && !isBundle) classes.push('jamtile');
            btn.className = classes.join(' ');
            btn.style.background = `linear-gradient(180deg, ${color1}, ${color3}, ${color2})`;

            // filtering will use this to make changes to specific shop tiles
            btn.id = entry.offerId

            btn.onclick = function () {
                window.open(`item.html?${entry.offerId}`, "_self");
                //openEntry(entry, 0);
            };

            // this html was written originally on a static page, and then copied here and changed
            // to hook it up to the variables of the function
            btn.innerHTML = `
            <img class="featuredimg" src="${featuredSrc}">
            <div class="shopiteminfo">
                ${hasBanner ? `<p class="shoptilebanner">${entry.banner.value}</p>` : ''}
                <p class="itemname">${itemName}</p>
                <p class="itemtype">${itemType}</p>
                <div style="display: flex; gap: 5px; width: 100%;">
                    <img class="itemprice" src="images/vbucks.png" style="transform: translateY(3px);">
                    <p class="itemprice">${entry.finalPrice.toLocaleString()}</p>
                    ${hasDiscount ? `<p class="itemprice bundleprice">${entry.regularPrice.toLocaleString()}</p>` : ''}
                </div>
            </div>
            <div class="shopiteminfobackground" style="background: linear-gradient(180deg, rgba(0,0,0,0), ${textBg});"></div>
        `;

            currentSection.appendChild(btn);
        }

    }

    fetchShop();
</script>

</html>
